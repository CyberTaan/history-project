<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Project</title>
    <style>
        canvas { border: 2px solid black; background: #090909f0; }
        #scoreBoard {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="scoreBoard">Score: <span id="score">0</span></div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // Make the canvas fill the whole browser window
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game Variables
        let score = 0;
        const scoreElement = document.getElementById("score");

        // The Player (Red Dot)
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            color: "blue",
            speed: 5
        };

        // The Collectibles (Yellow Dots)
        let dots = [];
        let enemies = [];
        let projectiles = [];
        const dotCount = 15;

        // Function to scatter random yellow dots
        function spawnDots() {
            for (let i = 0; i < dotCount; i++) {
                dots.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    radius: 8,
                    color: "yellow"
                });
            }
        }
        function spawnEnemies() {
            // Spawn 3 enemies at random edges
            for (let i = 0; i < 3; i++) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() > 0.5 ? 0 : canvas.height,
                    radius: 15, color: "red", speed: 2, 
                    shootCooldown: Math.random() * 100 // Randomize first shot
                });
            }
        }
        spawnDots(); // Spawn the first batch
        spawnEnemies();
        // Better movement system: tracking if a key is currently held down
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
        };

        window.addEventListener("keydown", (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener("keyup",   (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        function update() {
            // 1. Move Player smoothly
            if (keys.ArrowUp) player.y -= player.speed;
            if (keys.ArrowDown) player.y += player.speed;
            if (keys.ArrowLeft) player.x -= player.speed;
            if (keys.ArrowRight) player.x += player.speed;

            // Keep player inside the screen bounds
            if (player.x < player.radius) player.x = player.radius;
            if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
            if (player.y < player.radius) player.y = player.radius;
            if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;

            // 2. Check for Collisions
            for (let i = 0; i < dots.length; i++) {
                let dot = dots[i];
                
                // Calculate distance between center of player and center of dot
                let dist = Math.hypot(player.x - dot.x, player.y - dot.y);

                // If distance is less than both radii combined, they are touching!
                if (dist - player.radius - dot.radius < 1) {
                    dots.splice(i, 1);       // Remove the dot from the array
                    score += 10;             // Add points
                    scoreElement.innerText = score; // Update HTML text
                    i--;                     // Adjust array index after removing an item
                }
            }

            // Respawn dots if you collect them all
            if (dots.length === 0) spawnDots();
            // 3. Enemy AI (Move & Shoot)
            const targetDistance = 200;

            enemies.forEach(enemy => {
                // Find angle and distance to player
                let dx = player.x - enemy.x;
                let dy = player.y - enemy.y;
                let distance = Math.hypot(dx, dy);
                let angle = Math.atan2(dy, dx);

                // Advance or Retreat
                if (distance > targetDistance + 5) {
                    enemy.x += Math.cos(angle) * enemy.speed; // Move closer
                    enemy.y += Math.sin(angle) * enemy.speed;
                } else if (distance < targetDistance - 5) {
                    enemy.x -= Math.cos(angle) * enemy.speed; // Back away
                    enemy.y -= Math.sin(angle) * enemy.speed;
                }

                // Shoot Logic
                enemy.shootCooldown--;
                if (enemy.shootCooldown <= 0) {
                    projectiles.push({
                        x: enemy.x, y: enemy.y,
                        width: 10, height: 10, color: "white",
                        vx: Math.cos(angle) * 4, // Projectile speed is 4
                        vy: Math.sin(angle) * 4
                    });
                    enemy.shootCooldown = 90; // Wait 90 frames (~1.5 seconds) before next shot
                }
            });

            // 4. Update Projectiles & Check Player Collision
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;

                // Circle (Player) vs Rectangle (Projectile) collision
                let testX = player.x;
                let testY = player.y;

                // Find closest edges
                if (player.x < p.x) testX = p.x; 
                else if (player.x > p.x + p.width) testX = p.x + p.width;
                
                if (player.y < p.y) testY = p.y; 
                else if (player.y > p.y + p.height) testY = p.y + p.height;

                let distX = player.x - testX;
                let distY = player.y - testY;
                let hitDistance = Math.hypot(distX, distY);

                // If hit, reset score and destroy projectile
                if (hitDistance <= player.radius) {
                    score = 0;
                    scoreElement.innerText = score;
                    projectiles.splice(i, 1);
                    continue;
                }

                // Remove projectiles that go off-screen
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    projectiles.splice(i, 1);
                }
            }
        }

        function draw() {
            // Clear the canvas for the new frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw all yellow dots
            dots.forEach(dot => {
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2);
                ctx.fillStyle = dot.color;
                ctx.fill();
                ctx.closePath();
            });

            // Draw the blue player dot
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();

            // Draw Projectiles (White Rectangles)
            projectiles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.width, p.height);

            });

            // Draw Enemies
            enemies.forEach(enemy => {
                ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fillStyle = enemy.color; ctx.fill(); ctx.closePath();
            });
        }

        // The main game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop(); // Start the engine
    </script>
</body>
</html>
